<!DOCTYPE html>
<html lang="en">
<head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QZ353FEFF5"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-QZ353FEFF5');

<meta charset="UTF-8">
<title>RUNEST Card</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f4f7;
display:flex;
justify-content:center;
padding:30px;
}

.card{
width:390px;
background:#fff;
border-radius:22px;
padding:28px;
text-align:center;
box-shadow:0 12px 35px rgba(0,0,0,0.12);
}

.logo{
width:200px;
margin:10px auto;
display:block;
}

.subtitle{
color:#666;
margin-bottom:12px;
font-size:14px;
}

.tabs{
margin:10px 0;
}

.tab{
display:inline-block;
padding:6px 14px;
margin:4px;
border-radius:20px;
border:1px solid #ccc;
cursor:pointer;
font-size:14px;
}

.tab.active{
background:#00b894;
color:#fff;
border:none;
}

.avatar{
width:135px;
height:135px;
border-radius:50%;
object-fit:cover;
border:4px solid #eee;
margin-top:10px;
}

.name{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.role{
color:#666;
margin-bottom:10px;
}

.btn{
display:block;
margin:8px 0;
padding:12px;
border-radius:10px;
color:#fff;
text-decoration:none;
font-weight:600;
}

.wa{background:#25D366;}
.call{background:#1e90ff;}
.email{background:#636e72;}
.web{background:#2d3436;}
</style>
</head>

<body>

<div class="card">

<!-- ✅ 公司LOGO（恢复） -->
<img class="logo" src="companylogong.png" alt="Company Logo">

<div class="subtitle">Paper Packaging Manufacturer</div>

<div class="tabs">
<div class="tab active" onclick="switchUser(0)">Nicole</div>
</div>

<!-- ✅ 头像（恢复真实文件名） -->
<img id="avatar" class="avatar" src="Nicole照片.jpg">

<div id="name" class="name">Nicole</div>
<div id="role" class="role">Sales Manager</div>

<a id="wa" class="btn wa" href="#">WhatsApp</a>
<a id="call" class="btn call" href="#">Call</a>
<a id="email" class="btn email" href="#">Email</a>
<a class="btn web"
   href="https://www.runest.net/"
   target="_blank"
   style="display:block; position:relative; z-index:9999;">
   🌐 Website
</a>
</div>

<script>

const users = [
{
name:"Nicole Ma",
role:"Sales Manager",
img:"Nicole照片.jpg",
phone:"+8618121368997",
email:"nicole@runest.net",
wa:"https://wa.me/8618121368997"
},
];

function switchUser(i){

const u = users[i];

// 文本
document.getElementById("name").innerText = u.name;
document.getElementById("role").innerText = u.role;

// 头像（关键修复）
document.getElementById("avatar").src = u.img;

// 按钮
document.getElementById("wa").href = u.wa;
document.getElementById("call").href = "tel:" + u.phone;
document.getElementById("email").href = "mailto:" + u.email;

// tab状态
document.querySelectorAll(".tab").forEach((t,idx)=>{
t.classList.toggle("active", idx === i);
});

}

// 默认加载
window.onload = function(){
switchUser(0);
};

</script>

</body>
</html>
